<!DOCTYPE html>
<html>
<head>
    <title>Stress Relief Button</title>
    <style>
        body {
            background-color: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        button {
            padding: 30px 60px;
            font-size: 24px;
            border: none;
            border-radius: 20px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
            background-color: #45a049;
        }
    </style>
</head>
<body>

<button onclick="playSound()">Relieve Stress 😌</button>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
function playSound() {
    var audio = document.getElementById("sound");
    audio.play();
}
</script>

</body>
</html>
